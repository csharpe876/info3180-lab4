{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>
<style>
  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin: 30px 0;
  }
  .image-grid-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #fff;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .image-grid-item img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: 8px;
  }
</style>
<div class="image-grid">
  {% for filename in images %}
    <div class="image-grid-item">
      <img src="{{ url_for('get_image', filename=filename) }}" alt="{{ filename }}" />
      <span style="font-size: 0.9em; color: #555;">{{ filename }}</span>
    </div>
  {% endfor %}
</div>
{% endblock %}
